spring.application.name=consultant

 spring.datasource.url=jdbc:mysql://localhost:3306/doctor_patient
 spring.datasource.username=${DB_USERNAME:your_actual_username_only_locally}
 spring.datasource.password=${DB_PASSWORD:your_actual_password_only_locally}
 spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=your-super-long-secret-key-at-least-32-characters
